date.timezone=UTC
expose_php=0

# Errors
error_reporting=E_ALL
display_errors=0
display_startup_errors=0

# OPcache
opcache.enable=1
opcache.enable_cli=1
opcache.validate_timestamps=0
opcache.jit_buffer_size=10M
opcache.jit=tracing
opcache.max_accelerated_files=75000

# Xdebug
xdebug.mode=off
xdebug.start_with_request=no
