name: Docker Images bauen und pushen

# Baut die Produktions-Images (app, sshd, docs) und pusht sie in die integrierte
# Forgejo Container Registry. Ersetzt den bisherigen Build direkt auf dem VPS
# (docker compose -f docker-compose.prod.yaml up -d --build): der Server pullt
# nur noch fertige Images — kein Quellcode/Repo auf dem VPS mehr nötig.
#
# Composer-/npm-/PHP-Abhängigkeiten werden NICHT im Runner installiert, sondern
# im jeweiligen (mehrstufigen) Docker-Build selbst. Der Runner braucht nur
# Docker CLI + Buildx.
#
# Ergebnis-Images (owner = git-Owner, lowercase):
#   git.familiehirsch.net/b3n/tragwerk        (app,  app/Dockerfile.prod)
#   git.familiehirsch.net/b3n/tragwerk-sshd   (sshd, docker/sshd/Dockerfile)
#   git.familiehirsch.net/b3n/tragwerk-docs   (docs, docs/Dockerfile)

on:
  push:
    branches:
      - 'main'   # Trigger bei jedem Push auf main
    tags:
      - 'v*'     # Trigger bei Version-Tags wie v1.0.0

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Runner mit Docker-Zugriff. Label ggf. an eure Runner-Config anpassen.
    runs-on: docker

    # Ein Job je Image, parallel. name = Image-Name-Suffix unter dem Owner,
    # context/file spiegeln docker-compose.prod.yaml.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tragwerk
            context: app
            file: app/Dockerfile.prod
            build_args: |
              GITHUB_TOKEN=${{ secrets.COMPOSER_GITHUB_TOKEN }}
          - name: tragwerk-sshd
            context: docker/sshd
            file: docker/sshd/Dockerfile
            build_args: ""
          - name: tragwerk-docs
            context: docs
            file: docs/Dockerfile
            build_args: ""

    steps:
      # 1. Quellcode auschecken
      - name: Code auschecken
        uses: actions/checkout@v4

      # 2. Docker CLI im Runner installieren (die docker/*-Actions rufen `docker`
      #    auf; das Runner-Image bringt es nicht mit).
      - name: Docker CLI installieren
        run: |
          apt-get update && apt-get install -y ca-certificates curl gnupg
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
          apt-get update && apt-get install -y docker-ce-cli

      # 3. Buildx (BuildKit-Backend) bereitstellen.
      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      # 4. Registry-Host + vollständigen (lowercase) Image-Namen berechnen.
      #    GITHUB_SERVER_URL enthält das Schema (https://) — muss für einen
      #    gültigen Image-Ref und docker/login-action entfernt werden.
      - name: Registry und Image-Namen bestimmen
        id: img
        run: |
          REGISTRY="${GITHUB_SERVER_URL#http://}"
          REGISTRY="${REGISTRY#https://}"
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${OWNER}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      # 5. An der Forgejo Container Registry anmelden.
      - name: Bei Forgejo Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.img.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      # 6. Tags/Labels ableiten: Branch-Name, SemVer aus Tags, 'latest' auf dem
      #    Default-Branch.
      - name: Docker Metadaten extrahieren
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 7. Image bauen und pushen. build_args ist nur für die app relevant
      #    (optionaler COMPOSER_GITHUB_TOKEN gegen github.com-API-Rate-Limits),
      #    für sshd/docs leer.
      - name: Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
