x-templates:
  default-variables: &default-variables
    TZ: UTC
  default-service: &default-service
    restart: unless-stopped
    tty: true
    stdin_open: true
    init: true
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      <<: *default-variables
  as-current-user: &as-current-user
    user: ${DOCKER_UID:-1000}:${DOCKER_GID:-1000}


name: tragwerk

services:
  app:
    <<:
      - *default-service
      - *as-current-user
    image: tragwerk/app
    ipc: host
    build:
      context: app
      dockerfile: Dockerfile
    container_name: tragwerk-app
    environment:
      <<: *default-variables
      PHP_IDE_CONFIG: "serverName=app"
    working_dir: /app
    depends_on:
      - db
      - mailpit
    volumes:
      - ./app:/app
      - ./app/app.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro
    ports:
      - "80:80"
      - "8080:8080"

  db:
    <<: *default-service
    image: postgres:18-alpine
    container_name: tragwerk-db
    environment:
      <<: *default-variables
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    command: [ "postgres", "-c", "log_statement=all" ]
    working_dir: "/app"
    volumes:
      - db-data:/var/lib/postgresql

  mailpit:
    <<: *default-service
    image: axllent/mailpit:latest
    container_name: tragwerk-mailpit
    ports:
      - "8025:8025"

volumes:
  db-data:
    driver: local
    name: tragwerk-db-data