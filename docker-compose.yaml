x-templates:
  default-variables: &default-variables
    TZ: UTC
  default-service: &default-service
    restart: unless-stopped
    tty: true
    stdin_open: true
    init: true
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      <<: *default-variables
  as-current-user: &as-current-user
    user: ${DOCKER_UID:-1000}:${DOCKER_GID:-1000}


name: tragwerk

services:
  app:
    <<:
      - *default-service
      - *as-current-user
    group_add:
      - "${DOCKER_SOCK_GID:-1001}"
    image: tragwerk/app
    ipc: host
    build:
      context: app
      dockerfile: Dockerfile
    container_name: tragwerk-app
    environment:
      <<: *default-variables
      PHP_IDE_CONFIG: "serverName=app"
      MERCURE_PUBLISHER_JWT_SECRET: ${MERCURE_PUBLISHER_JWT_SECRET:-changeme-publisher-secret}
      MERCURE_SUBSCRIBER_JWT_SECRET: ${MERCURE_SUBSCRIBER_JWT_SECRET:-changeme-subscriber-secret}
      MERCURE_HUB_URL: http://localhost/.well-known/mercure
    working_dir: /app
    depends_on:
      - db
      - mailpit
    volumes:
      - ./app:/app
      - ./app/app.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"

  db:
    <<: *default-service
    image: postgres:18-alpine
    container_name: tragwerk-db
    environment:
      <<: *default-variables
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    command: [ "postgres", "-c", "log_statement=all" ]
    working_dir: "/app"
    volumes:
      - db-data:/var/lib/postgresql

  sshd:
    <<: *default-service
    build:
      context: docker/sshd
      dockerfile: Dockerfile
    container_name: tragwerk-sshd
    ports:
      - "2222:22"
    volumes:
      - ./app/data/repositories:/home/git/repos
      - ./app/data/ssh:/home/git/ssh_data

  mailpit:
    <<: *default-service
    image: axllent/mailpit:latest
    container_name: tragwerk-mailpit
    ports:
      - "8025:8025"

volumes:
  db-data:
    driver: local
    name: tragwerk-db-data