server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # VitePress builds clean URLs (e.g. /app/domains -> app/domains.html).
    # Resolve a request to the file, the .html variant, a directory, else 404.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
}
