<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Manrope, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAF7"/>
      <stop offset="1" stop-color="#F4F2EC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3D7DF6"/>
      <stop offset="1" stop-color="#2F6BE8"/>
    </linearGradient>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2a2f3a" flood-opacity="0.10"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2a2f3a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="6" fill="url(#accent)"/>

  <!-- header -->
  <g transform="translate(64,58)">
    <rect x="0" y="0" width="52" height="52" rx="13" fill="url(#accent)"/>
    <!-- girder / structure glyph -->
    <g stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" fill="none">
      <path d="M13 38 L26 14 L39 38 Z"/>
      <path d="M13 38 L39 38"/>
      <path d="M19.5 26 L32.5 26"/>
    </g>
    <text x="68" y="26" font-size="34" font-weight="800" fill="#2C313A" letter-spacing="-0.5">Tragwerk</text>
    <text x="68" y="49" font-size="16.5" font-weight="500" fill="#76787E">Self-hosted PHP hosting on any VPS with SSH</text>
  </g>

  <!-- process pipeline -->
  <g transform="translate(64,178)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#9A9CA1" letter-spacing="2">THE FLOW</text>

    <!-- steps -->
    <g transform="translate(0,22)">
      <!-- step 1 -->
      <g filter="url(#soft)">
        <rect x="0" y="0" width="240" height="92" rx="16" fill="#FFFFFF" stroke="#E7E5E0"/>
      </g>
      <circle cx="30" cy="34" r="15" fill="#EAF1FE"/>
      <text x="30" y="39" font-size="16" font-weight="800" fill="#2F6BE8" text-anchor="middle">1</text>
      <text x="56" y="32" font-size="18" font-weight="700" fill="#2C313A">Push code</text>
      <text x="56" y="58" font-size="13.5" font-weight="500" fill="#76787E">Git repo + simple</text>
      <text x="56" y="76" font-size="13.5" font-weight="600" fill="#2F6BE8" font-family="'JetBrains Mono', monospace">config.xml</text>

      <!-- arrow -->
      <path d="M250 46 L290 46" stroke="#C4C7CD" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M283 40 L291 46 L283 52" stroke="#C4C7CD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- step 2 -->
      <g transform="translate(300,0)">
        <g filter="url(#soft)">
          <rect x="0" y="0" width="240" height="92" rx="16" fill="#FFFFFF" stroke="#E7E5E0"/>
        </g>
        <circle cx="30" cy="34" r="15" fill="#EAF1FE"/>
        <text x="30" y="39" font-size="16" font-weight="800" fill="#2F6BE8" text-anchor="middle">2</text>
        <text x="56" y="32" font-size="18" font-weight="700" fill="#2C313A">Auto-generate</text>
        <text x="56" y="58" font-size="13.5" font-weight="500" fill="#76787E">Docker Compose from</text>
        <text x="56" y="76" font-size="13.5" font-weight="500" fill="#76787E">your XML — zero YAML</text>

        <path d="M250 46 L290 46" stroke="#C4C7CD" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M283 40 L291 46 L283 52" stroke="#C4C7CD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>

      <!-- step 3 -->
      <g transform="translate(600,0)">
        <g filter="url(#soft)">
          <rect x="0" y="0" width="240" height="92" rx="16" fill="#FFFFFF" stroke="#E7E5E0"/>
        </g>
        <circle cx="30" cy="34" r="15" fill="#EAF1FE"/>
        <text x="30" y="39" font-size="16" font-weight="800" fill="#2F6BE8" text-anchor="middle">3</text>
        <text x="56" y="32" font-size="18" font-weight="700" fill="#2C313A">Build &amp; deploy</text>
        <text x="56" y="58" font-size="13.5" font-weight="500" fill="#76787E">FrankenPHP — worker</text>
        <text x="56" y="76" font-size="13.5" font-weight="500" fill="#76787E">or classic mode</text>

        <path d="M250 46 L290 46" stroke="#C4C7CD" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M283 40 L291 46 L283 52" stroke="#C4C7CD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </g>

      <!-- step 4 -->
      <g transform="translate(900,0)">
        <g filter="url(#soft)">
          <rect x="0" y="0" width="172" height="92" rx="16" fill="#102A52"/>
        </g>
        <circle cx="30" cy="34" r="15" fill="#1FA968"/>
        <path d="M24 34 l4.5 4.5 L37 30" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="56" y="32" font-size="18" font-weight="700" fill="#FFFFFF">Live</text>
        <text x="56" y="58" font-size="13.5" font-weight="500" fill="#B9C6DC">Traefik routes it,</text>
        <text x="56" y="76" font-size="13.5" font-weight="500" fill="#B9C6DC">SSL auto-issued</text>
      </g>
    </g>
  </g>

  <!-- capabilities -->
  <g transform="translate(64,358)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#9A9CA1" letter-spacing="2">WHAT YOU GET</text>
    <g transform="translate(0,20)" filter="url(#card)">
      <rect x="0" y="0" width="1072" height="172" rx="20" fill="#FFFFFF" stroke="#E7E5E0"/>
    </g>

    <!-- feature grid: 3 cols x 2 rows -->
    <g transform="translate(34,52)" font-size="16" font-weight="700" fill="#2C313A">
      <!-- row 1 -->
      <g>
        <rect x="0" y="-2" width="34" height="34" rx="9" fill="#EAF1FE"/>
        <path d="M9 14 v-3 a8 8 0 0 1 16 0 v3 M6 14 h22 v12 a2 2 0 0 1 -2 2 H8 a2 2 0 0 1 -2 -2 Z" transform="translate(0,-1)" stroke="#2F6BE8" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="48" y="13">Automatic SSL</text>
        <text x="48" y="33" font-size="13.5" font-weight="500" fill="#76787E">certificates, renewed for you</text>
      </g>
      <g transform="translate(356,0)">
        <rect x="0" y="-2" width="34" height="34" rx="9" fill="#EDE9FE"/>
        <g transform="translate(7,5)" stroke="#7C4DEE" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="8" height="8" rx="2"/>
          <rect x="11" y="11" width="8" height="8" rx="2"/>
          <path d="M5 9 v3 a2 2 0 0 0 2 2 h6"/>
        </g>
        <text x="48" y="13">Isolated environments</text>
        <text x="48" y="33" font-size="13.5" font-weight="500" fill="#76787E">with per-env data cloning</text>
      </g>
      <g transform="translate(712,0)">
        <rect x="0" y="-2" width="34" height="34" rx="9" fill="#E7F6EE"/>
        <g transform="translate(7,5)" stroke="#1FA968" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="18" height="6" rx="2"/>
          <rect x="1" y="13" width="18" height="6" rx="2"/>
          <circle cx="5" cy="4" r="0.6"/>
          <circle cx="5" cy="16" r="0.6"/>
        </g>
        <text x="48" y="13">Multiple apps</text>
        <text x="48" y="33" font-size="13.5" font-weight="500" fill="#76787E">on one VPS, side by side</text>
      </g>

      <!-- row 2 -->
      <g transform="translate(0,76)">
        <rect x="0" y="-2" width="34" height="34" rx="9" fill="#FBF1DC"/>
        <g transform="translate(8,4)" stroke="#D89A2E" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="10" r="8"/>
          <path d="M9 5 v5 l3 3"/>
        </g>
        <text x="48" y="13">Per-app cronjobs</text>
        <text x="48" y="33" font-size="13.5" font-weight="500" fill="#76787E">scheduled in your config</text>
      </g>
      <g transform="translate(356,76)">
        <rect x="0" y="-2" width="34" height="34" rx="9" fill="#EAF1FE"/>
        <g transform="translate(7,6)" stroke="#2F6BE8" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 17 L1 1"/>
          <path d="M1 13 L6 8 L10 11 L17 3"/>
        </g>
        <text x="48" y="13">Live metrics &amp; logs</text>
        <text x="48" y="33" font-size="13.5" font-weight="500" fill="#76787E">graphs, cron history, streams</text>
      </g>
      <g transform="translate(712,76)">
        <rect x="0" y="-2" width="34" height="34" rx="9" fill="#EDE9FE"/>
        <g transform="translate(7,5)" stroke="#7C4DEE" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 1 L18 5 v6 c0 5 -4 7 -8 9 c-4 -2 -8 -4 -8 -9 V5 Z"/>
          <path d="M6 10 l3 3 l5 -6"/>
        </g>
        <text x="48" y="13">WebUI or config file</text>
        <text x="48" y="33" font-size="13.5" font-weight="500" fill="#76787E">manage it your way</text>
      </g>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(64,600)">
    <text x="0" y="0" font-size="14.5" font-weight="600" fill="#76787E">Docker · FrankenPHP · Traefik · PostgreSQL</text>
    <text x="1072" y="0" font-size="14.5" font-weight="700" fill="#2F6BE8" text-anchor="end">tragwerk.build</text>
  </g>
</svg>
