name: Build and push Docker images (GitHub / ghcr.io)

# GitHub variant of .forgejo/workflows/build-and-push.yml. Builds the production
# images (app, sshd, docs) and pushes them to the GitHub Container Registry
# (ghcr.io) instead of the Forgejo registry.
#
# Composer/npm/PHP dependencies are NOT installed on the runner but inside each
# (multi-stage) Docker build itself. GitHub-hosted runners already ship Docker
# CLI + Buildx, so the manual Docker CLI install from the Forgejo variant is
# dropped.
#
# Resulting images (owner = GitHub owner, lowercase):
#   ghcr.io/<owner>/tragwerk        (app,  app/Dockerfile.prod)
#   ghcr.io/<owner>/tragwerk-sshd   (sshd, docker/sshd/Dockerfile)
#   ghcr.io/<owner>/tragwerk-docs   (docs, docs/Dockerfile)

on:
  push:
    branches:
      - 'main'   # Trigger on every push to main
    tags:
      - 'v*'     # Trigger on version tags like v1.0.0

# packages: write lets the built-in GITHUB_TOKEN push to ghcr.io.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # One job per image, in parallel. name = image name suffix under the owner,
    # context/file mirror docker-compose.prod.yaml.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tragwerk
            context: app
            file: app/Dockerfile.prod
            build_args: |
              GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          - name: tragwerk-sshd
            context: docker/sshd
            file: docker/sshd/Dockerfile
            build_args: ""
          - name: tragwerk-docs
            context: docs
            file: docs/Dockerfile
            build_args: ""

    steps:
      # 1. Check out the source
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Set up Buildx (BuildKit backend).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Compute the full (lowercase) image name. On GitHub the registry is
      #    always ghcr.io; the owner may contain uppercase letters and must be
      #    lowercase for a valid image ref.
      - name: Determine image name
        id: img
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      # 4. Log in to the GitHub Container Registry (built-in GITHUB_TOKEN).
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Derive tags/labels: branch name, SemVer from tags, 'latest' on the
      #    default branch.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 6. Build and push the image. build_args only matters for the app
      #    (GITHUB_TOKEN to avoid github.com API rate limits during the Composer
      #    install), empty for sshd/docs.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
