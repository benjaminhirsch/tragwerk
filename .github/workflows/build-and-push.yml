name: Build and push Docker images (GitHub / ghcr.io)

# GitHub variant of .forgejo/workflows/build-and-push.yml. Builds the production
# images (app, sshd, docs) and pushes them to the GitHub Container Registry
# (ghcr.io) instead of the Forgejo registry.
#
# Composer/npm/PHP dependencies are NOT installed on the runner but inside each
# (multi-stage) Docker build itself. GitHub-hosted runners already ship Docker
# CLI + Buildx, so the manual Docker CLI install from the Forgejo variant is
# dropped.
#
# Resulting images (owner = GitHub owner, lowercase):
#   ghcr.io/<owner>/tragwerk        (app,  app/Dockerfile.prod)
#   ghcr.io/<owner>/tragwerk-sshd   (sshd, docker/sshd/Dockerfile)
#   ghcr.io/<owner>/tragwerk-docs   (docs, docs/Dockerfile)

on:
  push:
    branches:
      - 'main'   # Trigger on every push to main
    tags:
      - 'v*'     # Trigger on version tags like v1.0.0

# packages: write lets the built-in GITHUB_TOKEN push to ghcr.io.
permissions:
  contents: read
  packages: write

jobs:
  # Gate: run the full check suite (lint, code style, static analysis, tests)
  # by reusing pr-checks.yml. Images are only built if every check passes.
  checks:
    permissions:
      contents: read
    uses: ./.github/workflows/pr-checks.yml

  build-and-push:
    needs: checks
    runs-on: ubuntu-latest

    # One job per image, in parallel. name = image name suffix under the owner,
    # context/file mirror docker-compose.prod.yaml.
    strategy:
      fail-fast: false
      matrix:
        include:
          # build_token flags the app image, which needs GITHUB_TOKEN for the
          # Composer install. The secret itself is injected in the build step —
          # the `secrets` context is not available here in the matrix.
          - name: tragwerk
            context: app
            file: app/Dockerfile.prod
            build_token: true
          - name: tragwerk-sshd
            context: docker/sshd
            file: docker/sshd/Dockerfile
          - name: tragwerk-docs
            context: docs
            file: docs/Dockerfile

    steps:
      # 1. Check out the source
      - name: Check out code
        uses: actions/checkout@v5

      # 2. Set up Buildx (BuildKit backend).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 3. Compute the full (lowercase) image name. On GitHub the registry is
      #    always ghcr.io; the owner may contain uppercase letters and must be
      #    lowercase for a valid image ref.
      - name: Determine image name
        id: img
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      # 4. Log in to the GitHub Container Registry (built-in GITHUB_TOKEN).
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Derive tags/labels: branch name, SemVer from tags, 'latest' on the
      #    default branch.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 6. Build and push the image. Only the app image gets GITHUB_TOKEN (to
      #    avoid github.com API rate limits during the Composer install); sshd
      #    and docs get no build args. The secret is read here, where the
      #    `secrets` context is valid.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_token && format('GITHUB_TOKEN={0}', secrets.GITHUB_TOKEN) || '' }}
